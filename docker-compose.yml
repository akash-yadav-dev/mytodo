services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mytodo-postgres
    environment:
      POSTGRES_USER: mytodo
      POSTGRES_PASSWORD: mytodo_dev_password
      POSTGRES_DB: mytodo_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/scripts/init_auth_schema.sql:/docker-entrypoint-initdb.d/02-init_auth_schema.sql
      - ./infrastructure/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - mytodo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mytodo -d mytodo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mytodo-redis
    command: redis-server --appendonly yes --requirepass mytodo_redis_password --bind 0.0.0.0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mytodo-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mytodo_redis_password", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Elasticsearch (for search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: mytodo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - mytodo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # NATS Message Queue (alternative: use Kafka for production)
  nats:
    image: nats:2.10-alpine
    container_name: mytodo-nats
    command: "--jetstream --store_dir /data"
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
      - "6222:6222"  # Cluster connections
    volumes:
      - nats_data:/data
    networks:
      - mytodo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # MinIO (S3-compatible object storage for attachments)
  minio:
    image: minio/minio:latest
    container_name: mytodo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    networks:
      - mytodo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # API Server (Go backend)
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    container_name: mytodo-api
    environment:
      - ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=mytodo
      - DB_PASSWORD=mytodo_dev_password
      - DB_NAME=mytodo_dev
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=mytodo_redis_password
      - REDIS_DB=0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - NATS_URL=nats://nats:4222
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
    ports:
      - "8080:8080"

    volumes:
      - go_mod_cache:/go/pkg/mod

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

    networks:
      - mytodo-network
    restart: unless-stopped

  # Web Frontend (Next.js) - Uncomment when ready
  # web:
  #   build:
  #     context: ./apps/web
  #     dockerfile: ../../infrastructure/docker/web/Dockerfile
  #   container_name: mytodo-web
